    <script src="https://cdn.tailwindcss.com"></script>

        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { iosBlue: '#007AFF', iosGreen: '#34C759', iosRed: '#FF3B30', iosOrange: '#FF9500' } } }

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'SF Pro Display', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.25); }
        .dark .glass { background: rgba(28, 28, 30, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .smooth-transition { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); will-change: transform, opacity; }
        .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* สไตล์ปุ่ม Switch ปักหมุดแบบ iOS */
        .toggle-checkbox { left: 0; transition: all 0.3s ease; }
        .toggle-checkbox:checked { left: 24px; border-color: #34C759; }
        .toggle-checkbox:checked + .toggle-label { background-color: #34C759; }
        .toggle-label { background-color: #d1d5db; transition: all 0.3s ease; }
        .dark .toggle-label { background-color: #4b5563; }
    </style>
</head>

    <div class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-pink-400/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-md md:max-w-6xl mx-auto px-4 py-6 md:py-12 relative z-10">
        
        <header class="flex justify-between items-center mb-8 glass rounded-3xl p-4 shadow-xl smooth-transition">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 overflow-hidden bg-white">
    <img src="logo.png" alt="iWallet Logo" class="w-full h-full object-cover transform scale-110">
</div>
                <div>
                    <h1 class="text-xs text-gray-500 dark:text-gray-400 font-medium">บันทึกรายรับรายจ่าย</h1>
                    <p class="text-lg font-bold tracking-tight">savemoneyinfo</p>
                </div>
            </div>
            <button id="themeToggle" class="w-12 h-12 rounded-2xl glass flex items-center justify-center text-lg active:scale-90 smooth-transition">
                <i class="fa-solid fa-moon dark:hidden text-gray-700"></i>
                <i class="fa-solid fa-sun hidden dark:block text-iosOrange"></i>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass rounded-[2rem] p-6 shadow-2xl relative overflow-hidden border border-white/40 dark:border-white/10 flex flex-col justify-center">
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">ยอดเงินคงเหลือรวม</p>
                        <p class="text-4xl font-extrabold tracking-tight mb-6" id="totalBalance">฿0.00</p>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white/50 dark:bg-white/5 p-4 rounded-2xl border border-white/20">
                                <div class="flex items-center gap-2 text-iosGreen text-xs font-semibold mb-1"><i class="fa-solid fa-arrow-down-long"></i> รายรับรวม</div>
                                <p class="text-lg font-bold text-gray-800 dark:text-white" id="totalIncome">฿0.00</p>
                            </div>
                            <div class="bg-white/50 dark:bg-white/5 p-4 rounded-2xl border border-white/20">
                                <div class="flex items-center gap-2 text-iosRed text-xs font-semibold mb-1"><i class="fa-solid fa-arrow-up-long"></i> รายจ่ายรวม</div>
                                <p class="text-lg font-bold text-gray-800 dark:text-white" id="totalExpense">฿0.00</p>
                            </div>
                        </div>
                    </div>

                    <div class="glass rounded-[2rem] p-6 shadow-2xl border border-white/40 dark:border-white/10 flex flex-col justify-between" id="chartContainer">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xs font-bold text-gray-400 tracking-wide uppercase">ข้อมูลเชิงลึก</h2>
                            <div class="bg-gray-200/50 dark:bg-black/30 p-0.5 rounded-xl flex text-[11px] font-bold">
                                <button type="button" onclick="switchChartTab('overview')" id="tabChartOverview" class="px-3 py-1.5 rounded-lg bg-white dark:bg-gray-800 text-iosBlue shadow-sm smooth-transition">ภาพรวม</button>
                                <button type="button" onclick="switchChartTab('expense')" id="tabChartExpense" class="px-3 py-1.5 rounded-lg text-gray-500 dark:text-gray-400 smooth-transition">รายจ่าย</button>
                                <button type="button" onclick="switchChartTab('income')" id="tabChartIncome" class="px-3 py-1.5 rounded-lg text-gray-500 dark:text-gray-400 smooth-transition">รายรับ</button>

                        </div>
                        
                        <div class="relative h-44 w-full flex items-center justify-center">
                            <div id="overviewChartWrapper" class="w-full h-full">

                            <div id="expenseChartWrapper" class="w-full h-full hidden">

                        </div>

                <div class="glass rounded-[2rem] p-6 shadow-2xl border border-white/40 dark:border-white/10">
                    <div class="flex justify-between items-center mb-4">

                        <button onclick="exportToCSV()" class="text-xs bg-iosGreen/10 hover:bg-iosGreen/20 text-iosGreen font-bold px-3 py-1.5 rounded-xl smooth-transition flex items-center gap-1.5 shadow-sm">
                            <i class="fa-solid fa-file-excel"></i> ดาวน์โหลด CSV

                    </div>
                    
                    <div id="transactionList" class="space-y-3 max-h-[400px] overflow-y-auto no-scrollbar pb-6">

                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="glass rounded-[2rem] p-6 shadow-2xl sticky top-6 border border-white/40 dark:border-white/10">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold tracking-tight" id="formTitle">บันทึกรายการใหม่</h2>
                        <button type="button" id="cancelEditBtn" onclick="cancelEdit()" class="hidden text-xs bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded-full font-semibold text-gray-600 dark:text-gray-300 hover:bg-iosRed hover:text-white smooth-transition">ยกเลิกแก้ไข</button>
                    </div>
                    
                    <form id="txForm" class="space-y-4 relative">
                        <input type="hidden" id="editId" value="">

                        <div class="bg-gray-200/50 dark:bg-black/30 p-1 rounded-xl flex smooth-transition">
                            <button type="button" onclick="setTxType('expense')" id="btnExpense" class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white dark:bg-gray-800 shadow-sm text-iosRed smooth-transition">รายจ่าย</button>
                            <button type="button" onclick="setTxType('income')" id="btnIncome" class="flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500 dark:text-gray-400 smooth-transition">รายรับ</button>

                        <div class="flex items-center justify-between bg-white/60 dark:bg-black/20 p-3 rounded-xl border border-gray-200 dark:border-gray-800">
                            <label class="text-sm font-medium text-gray-600 dark:text-gray-300 flex items-center gap-2"><i class="fa-solid fa-thumbtack text-iosOrange"></i> ปักหมุดรายการนี้</label>
                            <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">

                            </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">วันที่ทำรายการ</label>
                            <input type="date" id="txDate" required class="w-full bg-white/60 dark:bg-black/20 border border-gray-200 dark:border-gray-800 rounded-xl p-3 text-sm text-gray-800 dark:text-white focus:outline-none focus:border-iosBlue smooth-transition">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">จำนวนเงิน (บาท)</label>
                            <input type="number" id="amount" required step="0.01" min="0.01" placeholder="0.00" class="w-full bg-white/60 dark:bg-black/20 border border-gray-200 dark:border-gray-800 rounded-xl p-3 text-2xl font-bold focus:outline-none focus:border-iosBlue text-center text-gray-800 dark:text-white smooth-transition">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">หมวดหมู่ / รายละเอียด</label>
                            <input type="text" id="category" required placeholder="เช่น ค่าอาหาร, เงินเดือน" class="w-full bg-white/60 dark:bg-black/20 border border-gray-200 dark:border-gray-800 rounded-xl p-3 text-sm focus:outline-none focus:border-iosBlue text-gray-800 dark:text-white smooth-transition">
                            
                            <div class="flex flex-wrap gap-1.5 mt-2" id="quickTags">
                                <button type="button" onclick="selectTag('🍔 ค่าอาหาร')" class="text-[11px] bg-white/80 dark:bg-white/5 border border-gray-200 dark:border-gray-800 px-2.5 py-1 rounded-full font-medium text-gray-600 dark:text-gray-300 hover:border-iosBlue smooth-transition">อาหาร</button>
                                <button type="button" onclick="selectTag('🚗 ค่าเดินทาง')" class="text-[11px] bg-white/80 dark:bg-white/5 border border-gray-200 dark:border-gray-800 px-2.5 py-1 rounded-full font-medium text-gray-600 dark:text-gray-300 hover:border-iosBlue smooth-transition">เดินทาง</button>
                                <button type="button" onclick="selectTag('🛍️ ช้อปปิ้ง')" class="text-[11px] bg-white/80 dark:bg-white/5 border border-gray-200 dark:border-gray-800 px-2.5 py-1 rounded-full font-medium text-gray-600 dark:text-gray-300 hover:border-iosBlue smooth-transition">ช้อปปิ้ง</button>
                                <button type="button" onclick="selectTag('💰 เงินเดือน')" class="text-[11px] bg-white/80 dark:bg-white/5 border border-gray-200 dark:border-gray-800 px-2.5 py-1 rounded-full font-medium text-gray-600 dark:text-gray-300 hover:border-iosBlue smooth-transition">เงินเดือน</button>
                                <button type="button" onclick="selectTag('📈 ลงทุน')" class="text-[11px] bg-white/80 dark:bg-white/5 border border-gray-200 dark:border-gray-800 px-2.5 py-1 rounded-full font-medium text-gray-600 dark:text-gray-300 hover:border-iosBlue smooth-transition">ลงทุน</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">ช่องทางการรับ/จ่าย</label>
                            <select id="account" class="w-full bg-white/60 dark:bg-black/20 border border-gray-200 dark:border-gray-800 rounded-xl p-3 text-sm focus:outline-none focus:border-iosBlue text-gray-800 dark:text-white smooth-transition">
                                <option value="เงินสด">💵 เงินสด</option>
                                <option value="บัญชีธนาคาร">🏦 บัญชีธนาคาร</option>
                                <option value="Wallet">📱 Wallet</option>
                                <option value="บัตรเครดิต">💳 บัตรเครดิต</option>
                            </select>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-iosBlue text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-blue-500/20 active:scale-[0.98] hover:bg-blue-600 smooth-transition flex justify-center items-center gap-2">
                            <i class="fa-solid fa-cloud-arrow-up"></i> <span id="submitText">บันทึกข้อมูล</span>
                        </button>

                        <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/60 dark:bg-black/60 backdrop-blur-sm rounded-xl flex items-center justify-center z-10">
                            <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-xl flex flex-col items-center">
                                <i class="fa-solid fa-circle-notch animate-spin text-iosBlue text-3xl mb-2"></i>
                                <span class="text-xs font-bold mt-2 text-gray-700 dark:text-gray-300">กำลังส่งข้อมูล...</span>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPMIN4I6FTGl1opmurV0Lc7ez0LR5-9Eg",
            authDomain: "savemoney-98630.firebaseapp.com",
            projectId: "savemoney-98630",
            storageBucket: "savemoney-98630.firebasestorage.app",
            messagingSenderId: "1046270701404",
            appId: "1:1046270701404:web:f4ada2bbf6d86c5f5e9b99"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const txCollection = collection(db, "transactions");

        let currentType = 'expense';
        let activeChartTab = 'overview'; // ตั้งค่าเริ่มต้นให้เปิดที่แท็บภาพรวม
        let allTransactions = []; 
        let overviewChart = null;
        let expenseChart = null; 
        let incomeChart = null; 

        // ฟังก์ชันตั้งค่าวันที่
        function setLocalISODate() {
            const now = new Date();
            const tzOffset = now.getTimezoneOffset() * 60000;
            const localISOTime = new Date(now.getTime() - tzOffset).toISOString().split('T')[0];
            document.getElementById('txDate').value = localISOTime;
        }
        
        setLocalISODate();

        window.setTxType = function(type) {
            currentType = type;
            const btnExpense = document.getElementById('btnExpense');
            const btnIncome = document.getElementById('btnIncome');
            
            if(type === 'expense') {
                btnExpense.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-white dark:bg-gray-800 shadow-sm text-iosRed smooth-transition";
                btnIncome.className = "flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500 dark:text-gray-400 smooth-transition";
            } else {
                btnIncome.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-white dark:bg-gray-800 shadow-sm text-iosGreen smooth-transition";
                btnExpense.className = "flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500 dark:text-gray-400 smooth-transition";
            }
        }

        window.selectTag = function(tagName) {
            document.getElementById('category').value = tagName;
        }

        window.toggleQuickPin = async function(id, currentStatus) {
            try {
                await updateDoc(doc(db, "transactions", id), { isPinned: !currentStatus });
            } catch (error) {
                alert("สิทธิ์การเข้าถึงฐานข้อมูลถูกปฏิเสธ");
            }
        }

        // ฟังก์ชันสลับการแสดงผล 3 แท็บกราฟ
        window.switchChartTab = function(tab) {
            activeChartTab = tab;
            const tabOver = document.getElementById('tabChartOverview');
            const tabExp = document.getElementById('tabChartExpense');
            const tabInc = document.getElementById('tabChartIncome');
            
            const wrapOver = document.getElementById('overviewChartWrapper');
            const wrapExp = document.getElementById('expenseChartWrapper');
            const wrapInc = document.getElementById('incomeChartWrapper');
            const emptyState = document.getElementById('chartEmptyState');

            // รีเซ็ตคลาสปุ่มทั้งหมด
            tabOver.className = "px-3 py-1.5 rounded-lg text-gray-500 dark:text-gray-400 smooth-transition";
            tabExp.className = "px-3 py-1.5 rounded-lg text-gray-500 dark:text-gray-400 smooth-transition";
            tabInc.className = "px-3 py-1.5 rounded-lg text-gray-500 dark:text-gray-400 smooth-transition";
            
            wrapOver.classList.add('hidden');
            wrapExp.classList.add('hidden');
            wrapInc.classList.add('hidden');
            emptyState.classList.add('hidden');

            // เช็คการเปลี่ยนแท็บ
            if (tab === 'overview') {
                tabOver.className = "px-3 py-1.5 rounded-lg bg-white dark:bg-gray-800 text-iosBlue shadow-sm smooth-transition";
                if (overviewChart) wrapOver.classList.remove('hidden');
                else emptyState.classList.remove('hidden');
            } else if (tab === 'expense') {
                tabExp.className = "px-3 py-1.5 rounded-lg bg-white dark:bg-gray-800 text-iosRed shadow-sm smooth-transition";
                if (expenseChart) wrapExp.classList.remove('hidden');
                else emptyState.classList.remove('hidden');
            } else if (tab === 'income') {
                tabInc.className = "px-3 py-1.5 rounded-lg bg-white dark:bg-gray-800 text-iosGreen shadow-sm smooth-transition";
                if (incomeChart) wrapInc.classList.remove('hidden');
                else emptyState.classList.remove('hidden');
            }
        }

        // ฟังก์ชันประมวลผลและสร้างกราฟทั้ง 3 รูปแบบ
        function renderCharts(transactions) {
            let totalInc = 0;
            let totalExp = 0;
            const expenseData = {};
            const incomeData = {};

            transactions.forEach(t => {
                if (t.type === 'expense') {
                    expenseData[t.category] = (expenseData[t.category] || 0) + t.amount;
                    totalExp += t.amount;
                } else if (t.type === 'income') {
                    incomeData[t.category] = (incomeData[t.category] || 0) + t.amount;
                    totalInc += t.amount;
                }
            });

            const expLabels = Object.keys(expenseData);
            const expData = Object.values(expenseData);
            const incLabels = Object.keys(incomeData);
            const incData = Object.values(incomeData);

            if (overviewChart) overviewChart.destroy();
            if (expenseChart) expenseChart.destroy();
            if (incomeChart) incomeChart.destroy();

            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#e5e7eb' : '#4a5568';
            const gridColor = isDark ? '#374151' : '#e5e7eb';

            // 1. สร้างกราฟแท่ง (ภาพรวม)
            if (totalInc > 0 || totalExp > 0) {
                const ctxOver = document.getElementById('overviewChart').getContext('2d');
                overviewChart = new Chart(ctxOver, {
                    type: 'bar',
                    data: {
                        labels: ['รายรับทั้งหมด', 'รายจ่ายทั้งหมด'],
                        datasets: [{
                            data: [totalInc, totalExp],
                            backgroundColor: ['#34C759', '#FF3B30'],
                            borderRadius: 6,
                            barThickness: 45
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor, font: {family: 'SF Pro Display'} } },
                            x: { grid: { display: false }, ticks: { color: textColor, font: {family: 'SF Pro Display', weight: 'bold'} } }
                        }
                    }
                });
            } else { overviewChart = null; }

            const donutOptions = {
                responsive: true, maintainAspectRatio: false, cutout: '65%',
                plugins: {
                    legend: { position: 'right', labels: { boxWidth: 8, padding: 6, font: { size: 10, family: 'SF Pro Display' }, color: textColor } }
                }
            };

            // 2. สร้างกราฟโดนัท (รายจ่าย)
            if (expLabels.length > 0) {
                const ctxExp = document.getElementById('expenseChart').getContext('2d');
                expenseChart = new Chart(ctxExp, {
                    type: 'doughnut',
                    data: { labels: expLabels, datasets: [{ data: expData, backgroundColor: ['#FF3B30', '#FF9500', '#FFCC00', '#FF2D55', '#AF52DE', '#5AC8FA'], borderWidth: 0 }] },
                    options: donutOptions
                });
            } else { expenseChart = null; }

            // 3. สร้างกราฟโดนัท (รายรับ)
            if (incLabels.length > 0) {
                const ctxInc = document.getElementById('incomeChart').getContext('2d');
                incomeChart = new Chart(ctxInc, {
                    type: 'doughnut',
                    data: { labels: incLabels, datasets: [{ data: incData, backgroundColor: ['#34C759', '#32ADE6', '#007AFF', '#5856D6', '#FF9500', '#FFCC00'], borderWidth: 0 }] },
                    options: donutOptions
                });
            } else { incomeChart = null; }

            // อัปเดต UI เปิดแท็บปัจจุบัน
            switchChartTab(activeChartTab);
        }

        // ระบบบันทึก / แก้ไขข้อมูลฟอร์ม
        document.getElementById('txForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const loadingOverlay = document.getElementById('loadingOverlay');
            
            submitBtn.disabled = true;
            loadingOverlay.classList.remove('hidden');

            const editId = document.getElementById('editId').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const account = document.getElementById('account').value;
            const isPinned = document.getElementById('isPinned').checked;
            
            const dateValue = document.getElementById('txDate').value;
            const nowTime = new Date();
            const chosenDate = new Date(dateValue);
            chosenDate.setHours(nowTime.getHours(), nowTime.getMinutes(), nowTime.getSeconds());
            let finalTimestamp = chosenDate.getTime();

            if (editId) {
                const oldTx = allTransactions.find(t => t.id === editId);
                if (oldTx && oldTx.timestamp) {
                    const oldDateObj = new Date(oldTx.timestamp);
                    const oldDateStr = new Date(oldDateObj.getTime() - oldDateObj.getTimezoneOffset() * 60000).toISOString().split('T')[0];
                    if (oldDateStr === dateValue) { finalTimestamp = oldTx.timestamp; }
                }
            }

            try {
                const txData = {
                    type: currentType, amount: amount, category: category,
                    account: account, isPinned: isPinned, timestamp: finalTimestamp
                };

                if (editId) {
                    await updateDoc(doc(db, "transactions", editId), txData);
                    window.cancelEdit(); 
                } else {
                    await addDoc(txCollection, txData);
                    document.getElementById('txForm').reset();
                    setLocalISODate(); 
                    window.setTxType('expense');
                }
            } catch (error) {
                alert("เกิดข้อผิดพลาด: " + error.message);
            } finally {
                submitBtn.disabled = false;
                loadingOverlay.classList.add('hidden');
            }
        });

        window.editTx = function(id) {
            const tx = allTransactions.find(t => t.id === id);
            if(tx) {
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
                document.getElementById('formTitle').innerText = "แก้ไขรายการ";
                document.getElementById('formTitle').classList.add("text-iosOrange");
                document.getElementById('cancelEditBtn').classList.remove('hidden');
                document.getElementById('submitText').innerText = "อัปเดตข้อมูล";
                
                document.getElementById('editId').value = tx.id;
                document.getElementById('amount').value = tx.amount;
                document.getElementById('category').value = tx.category;
                document.getElementById('account').value = tx.account;
                document.getElementById('isPinned').checked = tx.isPinned || false;
                
                if(tx.timestamp){
                    const d = new Date(tx.timestamp);
                    const tzOffset = d.getTimezoneOffset() * 60000;
                    document.getElementById('txDate').value = new Date(d.getTime() - tzOffset).toISOString().split('T')[0];
                }
                window.setTxType(tx.type);
            }
        }

        window.cancelEdit = function() {
            document.getElementById('formTitle').innerText = "บันทึกรายการใหม่";
            document.getElementById('formTitle').classList.remove("text-iosOrange");
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('submitText').innerText = "บันทึกข้อมูล";
            document.getElementById('editId').value = "";
            document.getElementById('txForm').reset();
            setLocalISODate();
            window.setTxType('expense'); 
        }

        window.deleteTx = async function(id) {
            if(confirm('🗑️ ยืนยันการลบข้อมูลถาวร?')) {
                try { await deleteDoc(doc(db, "transactions", id)); } catch (error) { alert(error); }
            }
        }

        const q = query(txCollection, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const listEl = document.getElementById('transactionList');
            listEl.innerHTML = '';
            
            let balance = 0, income = 0, expense = 0;
            allTransactions = []; 

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                allTransactions.push({ id: docSnap.id, ...data });
                
                if (data.type === 'income') { income += data.amount; balance += data.amount; } 
                else { expense += data.amount; balance -= data.amount; }
            });

            renderCharts(allTransactions);

            allTransactions.sort((a, b) => {
                if (a.isPinned && !b.isPinned) return -1;
                if (!a.isPinned && b.isPinned) return 1;
                return b.timestamp - a.timestamp;
            });

            if (allTransactions.length === 0) {
                listEl.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">ยังไม่มีข้อมูลบันทึกในระบบ</div>`;
            }

            allTransactions.forEach((data) => {
                const icon = data.type === 'income' ? 'fa-arrow-down-long text-iosGreen bg-iosGreen/10' : 'fa-arrow-up-long text-iosRed bg-iosRed/10';
                const displayDate = data.timestamp ? new Date(data.timestamp).toLocaleDateString('th-TH', {day: 'numeric', month: 'short', year: '2-digit'}) : '-';
                const pinClass = data.isPinned ? 'text-iosOrange' : 'text-gray-300 dark:text-gray-600 hover:text-gray-400';

                const div = document.createElement('div');
                div.className = `relative bg-white/40 dark:bg-white/5 p-3.5 rounded-2xl flex justify-between items-center border hover:scale-[1.01] smooth-transition ${data.isPinned ? 'border-iosOrange/40 shadow-sm bg-orange-50/20 dark:bg-orange-900/10' : 'border-white/20'}`;
                
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-sm ${icon}"></div>
                        <div>
                            <p class="text-sm font-bold tracking-tight">${data.category}</p>
                            <div class="flex items-center gap-2 mt-0.5">
                                <p class="text-[10px] text-gray-500 dark:text-gray-400"><i class="fa-solid fa-building-columns opacity-70"></i> ${data.account}</p>
                                <p class="text-[10px] text-gray-400 dark:text-gray-500"><i class="fa-solid fa-calendar-days opacity-70"></i> ${displayDate}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right mr-1">
                            <p class="text-sm font-bold ${data.type === 'income' ? 'text-iosGreen' : 'text-iosRed'}">
                                ${data.type === 'income' ? '+' : '-'}฿${data.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                            </p>
                        </div>
                        <div class="flex items-center border-l border-gray-200 dark:border-gray-700 pl-2 gap-1.5">
                            <button onclick="toggleQuickPin('${data.id}', ${data.isPinned})" class="${pinClass} p-1 text-sm smooth-transition"><i class="fa-solid fa-thumbtack ${data.isPinned ? 'transform rotate-45' : ''}"></i></button>
                            <button onclick="editTx('${data.id}')" class="text-gray-400 hover:text-iosBlue p-1.5 text-xs bg-white dark:bg-gray-800 shadow-sm rounded-lg smooth-transition"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteTx('${data.id}')" class="text-gray-400 hover:text-iosRed p-1.5 text-xs bg-white dark:bg-gray-800 shadow-sm rounded-lg smooth-transition"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                `;
                listEl.appendChild(div);
            });

            document.getElementById('totalBalance').textContent = `฿${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('totalIncome').textContent = `฿${income.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('totalExpense').textContent = `฿${expense.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }, (error) => {
            document.getElementById('transactionList').innerHTML = `<div class="text-center py-8 text-iosRed text-sm font-bold"><i class="fa-solid fa-triangle-exclamation mb-2 text-2xl block"></i>เชื่อมต่อฐานข้อมูลไม่ได้ โปรดตรวจสอบ Firebase Rules</div>`;
        });

        window.exportToCSV = function() {
            if(allTransactions.length === 0) return alert("ไม่มีข้อมูลให้ส่งออก");
            let csvContent = "\uFEFFวันที่,ประเภท,หมวดหมู่,ช่องทางเงิน,จำนวนเงิน,ปักหมุด\n";
            allTransactions.forEach(t => {
                const d = t.timestamp ? new Date(t.timestamp).toLocaleDateString('th-TH') : '-';
                const safeCategory = t.category ? t.category.replace(/"/g, '""') : '';
                csvContent += `"${d}","${t.type === 'income' ? 'รายรับ' : 'รายจ่าย'}","${safeCategory}","${t.account}",${t.amount},"${t.isPinned ? 'ใช่' : 'ไม่ใช่'}"\n`;
            });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
            link.download = `บันทึกการเงิน_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            renderCharts(allTransactions); 
        });
    </script>
</body>
</html>
